{% extends 'base.html' %}

{% block content %}
<div class="main-chat-container">
    <div class="chat-overlay">
        <div class="action-menu">
            <div class="logo-panel">
                <p>ChatLink</p>
            </div>
            <div class="action-panel">
                <a href="" id="chat-icon"><img src="{{ url_for('static', filename='images/chat.png') }}"></a>
                <a href="" id="grp-icon"><img src="{{ url_for('static', filename='images/grps.png') }}"></a>
            </div>
            <div class="profile-panel">
                <a href=""><img src="{{ url_for('static', filename='images/circle-user.png') }}"></a>
                <a href=""><img src="{{ url_for('static', filename='images/leave.png') }}" alt=""></a>
            </div>
        </div>
        
        <div class="recent-chat-container">
            <div class="search-bar">
                <input type="search" name="" id="recent-chat-search" placeholder="Search">
                <button><img src="{{ url_for('static', filename='images/search.png') }}" alt=""></button>
            </div>
            <div class="recent-chat">
                <h3>Messages</h3>
                <div class="chat-container">    
                    <div class="chat" role="button" onclick="window.location.href='{{ url_for('main.chat') }}'">
                        <img src="{{ url_for('static', filename='images/user.png') }}" alt="">
                        <div class="chat-details">
                            <h4 class="chat-name">ChatLink</h4>
                            <p class="message-clip">WELCOME! Every message you receive will appear here.</p>
                        </div>
                        <p class="message-clip-time">5:00pm</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="messages-displayer">
            <div class="chat-message-header">
                <img src="{{ url_for('static', filename='images/user.png') }}">

                <div class="chat-header-details">
                    <h4>ChatLink</h4>
                    <p>online</p>
                </div>

                <div class="chat-file-selectors">
                    <label for="image-upload">
                        <img src="{{ url_for('static', filename='images/picture.png') }}" alt="">
                        <input type="file" accept="image/*" name="image-upload" id="image-upload" multiple>
                    </label>
                    <label for="file-upload">
                       <img src="{{ url_for('static', filename='images/file.png') }}" alt="">
                       <input type="file" name="file-upload" id="file-upload" multiple>
                    </label>
                </div>
            </div>

            <div class="messages-container">
                <div class="recieve-message">
                    <h5>ChatLink</h5>
                    <p>
                        WELCOME! Every message you send will appear here.
                        Yes here🤩
                    </p>
                </div>

                <div class="send-message">
                    <div class="chat-box">
                        <p>
                            This is where a message you send will display😉
                        </p>
                    </div>
                </div>

                <div class="message-bar">
                    <textarea name="message" id="message-input" placeholder="Type your message..."></textarea>
                    <label for="message-send-btn">
                        <img src="{{ url_for('static', filename='images/send.png') }}">
                        <input type="button" value="send" id="message-send-btn" style="visibility: hidden;"
                            onclick="
                            messageDisplayer('kenneth matimba', 'reciver');
                            "
                        >
                    </label>
                </div>

            </div>
        </div>
        
    </div>
</div>
<script>
    function messageDisplayer(name, person){
        let input = document.querySelector("#message-input");
        let messageDisplayer = document.querySelector(".messages-container");

        console.log("Welcome to chatlink");
        const message = input.value;

        let msgCont = document.createElement("div");
        if (person=="sender"){
            msgCont.className = "recieve-message";
            msgCont.innerHTML = `
                        <div class="chat-box">
                            <p>
                            ${message}
                            </p>
                        </div>
            `;
        }
        else{
            msgCont.className = "recieve-message";
            msgCont.innerHTML = `
                        <h5>${name}</h5>
                            <p>
                            ${message}
                            </p>
            `;
            console.log("came here")
        }

        messageDisplayer.appendChild(msgCont);
        console.log(message);

        input.value = "";
    }
</script>
{% endblock %}
